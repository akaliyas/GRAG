# 系统配置文件
# 敏感信息通过环境变量提供

# 数据库配置
database:
  postgresql:
    host: ${POSTGRES_HOST:localhost}
    port: ${POSTGRES_PORT:5432}
    database: ${POSTGRES_DB:grag_db}
    user: ${POSTGRES_USER:grag_user}
    password: ${POSTGRES_PASSWORD}  # 从环境变量读取
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
  
  neo4j:
    uri: ${NEO4J_URI:neo4j://localhost:7687}
    username: ${NEO4J_USERNAME:neo4j}
    password: ${NEO4J_PASSWORD:neo4j_password}
    database: ${NEO4J_DATABASE:neo4j}
    max_connection_pool_size: ${NEO4J_MAX_CONNECTION_POOL_SIZE:100}
    connection_timeout: ${NEO4J_CONNECTION_TIMEOUT:30}

# LightRAG 配置
lightrag:
  llm_model: ${LLM_MODEL:api}  # api 或 local
  embedding_model: ${EMBEDDING_MODEL:BAAI/bge-m3}  # 支持: BAAI/bge-m3, Pro/BAAI/bge-m3, text-embedding-3-small 等
  embedding_provider: ${EMBEDDING_PROVIDER:siliconflow}  # siliconflow, ollama, openai
  embedding_api_key: ${EMBEDDING_API_KEY}  # SiliconFlow 或 OpenAI API key (从环境变量读取)
  embedding_base_url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}  # SiliconFlow API 地址
  # 存储类型：file=文件系统（本地应用化），postgresql=Docker数据库，neo4j=图数据库
  storage_type: ${LIGHTRAG_STORAGE_TYPE:file}  # file, postgresql 或 neo4j
  # 文件存储目录（storage_type=file 时使用）
  working_dir: ${LIGHTRAG_WORKING_DIR:./rag_storage}
  # 存储后端配置
  kv_storage: ${LIGHTRAG_KV_STORAGE:JsonKVStorage}  # JsonKVStorage, PGKVStorage
  vector_storage: ${LIGHTRAG_VECTOR_STORAGE:NanoVectorDBStorage}  # NanoVectorDBStorage, PGVectorStorage
  graph_storage: ${LIGHTRAG_GRAPH_STORAGE:NetworkXStorage}  # NetworkXStorage, PGGraphStorage, Neo4JStorage
  doc_status_storage: ${LIGHTRAG_DOC_STATUS_STORAGE:JsonDocStatusStorage}  # JsonDocStatusStorage, PGDocStatusStorage
  # 实体/关系抽取的 prompt（符合 LightRAG 格式要求）
  entity_extraction_prompt: |
    ---Role---
    You are a Technical Documentation Knowledge Graph Specialist responsible for extracting entities and relationships from technical documentation text.

    ---Instructions---
    1. **Entity Extraction & Output:**
       * **Identification:** Identify clearly defined and meaningful entities in the input text, focusing on technical concepts, APIs, components, and configurations.
       * **Entity Types:** Use ONLY the following entity types: {entity_types}
          The available entity types include but are not limited to: Technology (frameworks, libraries), Concept (design patterns, principles), Component (modules, classes), API (interfaces, endpoints), Command (CLI instructions), Configuration (parameters, settings), Operation (workflows, tasks), File (paths, scripts), Resource (infrastructure, data sources), Service (running services), Environment (deployment contexts), Document (reference materials)
       * **Extraction Principles:**
         - Prioritize entities valuable for technical document retrieval
         - Keep entity names concise and clear
         - Choose the most appropriate type for borderline cases
         - Technology covers frameworks, libraries, tools, languages
       * **Entity Details:** For each identified entity, extract:
         - `entity_name`: The name of the entity (use consistent naming, e.g., "FastAPI", "PostgreSQL", "Docker Compose")
         - `entity_type`: One of the entity types listed above
         - `entity_description`: A concise technical description based on the input text
       * **Output Format - Entities:** Output a total of 4 fields for each entity, delimited by `{tuple_delimiter}`, on a single line. The first field *must* be the literal string `entity`.
         - Format: `entity{tuple_delimiter}entity_name{tuple_delimiter}entity_type{tuple_delimiter}entity_description`

    2. **Relationship Extraction & Output:**
       * **Identification:** Identify direct, meaningful relationships between extracted entities.
       * **Relationship Types:** Use ONLY the following 7 relationship types:
          - **depends_on**: One entity depends on another to function (e.g., Application depends_on PostgreSQL)
          - **uses**: One entity uses another's functionality (e.g., Controller uses Service)
          - **implements**: One entity implements another's interface (e.g., UserController implements APIInterface)
          - **contains**: One entity contains another as a component (e.g., Application contains Database)
          - **configures**: One entity configures another's behavior (e.g., .env configures Application)
          - **deploys_to**: One entity deploys to another (e.g., Application deploys_to Docker)
          - **relates_to**: Entities are related but relationship is unclear (e.g., Microservices relates_to Docker)
       * **Relationship Details:** For each relationship, extract:
         - `source_entity`: The name of the source entity
         - `target_entity`: The name of the target entity
         - `relationship_keywords`: High-level keywords (comma-separated)
         - `relationship_description`: Technical explanation of the relationship
       * **Output Format - Relationships:** Output a total of 5 fields, delimited by `{tuple_delimiter}`, on a single line. The first field *must* be the literal string `relation`.
         - Format: `relation{tuple_delimiter}source_entity{tuple_delimiter}target_entity{tuple_delimiter}relationship_keywords{tuple_delimiter}relationship_description`

    3. **Delimiter Usage Protocol:**
       * The `{tuple_delimiter}` is a complete marker and must not be filled with content. It serves strictly as a field separator.

    4. **Output Order & Prioritization:**
       * Output all extracted entities first, followed by all extracted relationships.
       * Prioritize relationships most significant to the technical architecture.

    5. **Context & Objectivity:**
       * Ensure all entity names and descriptions are written in the **third person**.
       * Explicitly name technical components; avoid generic pronouns like "this", "that", "it".

    6. **Language & Proper Nouns:**
       * The entire output must be written in `{language}`.
       * Keep technical terms, API names, and command syntax in their original form.

    7. **Completion Signal:** Output the literal string `{completion_delimiter}` only after all entities and relationships have been completely extracted.

    ---Examples---
    <Input Text>
    ```
    FastAPI is a modern, fast web framework for building APIs with Python 3.7+ based on standard Python type hints.

    Install FastAPI using pip:
    pip install fastapi
    pip install uvicorn[standard]

    Create a simple application:
    from fastapi import FastAPI
    app = FastAPI()

    @app.get("/api/v1/users")
    async def get_users():
        return {{"users": []}}
    ```

    <Output>
    entity{tuple_delimiter}FastAPI{tuple_delimiter}Technology{tuple_delimiter}FastAPI is a modern web framework for building APIs with Python 3.7+ using type hints.
    entity{tuple_delimiter}Python{tuple_delimiter}Technology{tuple_delimiter}Python is a programming language version 3.7+ used with FastAPI.
    entity{tuple_delimiter}pip{tuple_delimiter}Command{tuple_delimiter}pip is a package installer command for Python libraries.
    entity{tuple_delimiter}uvicorn[standard]{tuple_delimiter}Technology{tuple_delimiter}Uvicorn is an ASGI server with standard extras for running FastAPI applications.
    entity{tuple_delimiter}/api/v1/users{tuple_delimiter}API{tuple_delimiter}/api/v1/users is a REST API endpoint for retrieving users.
    entity{tuple_delimiter}get_users{tuple_delimiter}API{tuple_delimiter}get_users is an async function that handles user retrieval requests.
    relation{tuple_delimiter}FastAPI{tuple_delimiter}Python{tuple_delimiter}requires, language{tuple_delimiter}FastAPI requires Python 3.7+ to function.
    relation{tuple_delimiter}FastAPI{tuple_delimiter}uvicorn[standard]{tuple_delimiter}runs on, deployment{tuple_delimiter}FastAPI applications run on uvicorn ASGI server.
    relation{tuple_delimiter}get_users{tuple_delimiter}/api/v1/users{tuple_delimiter}implements, endpoint{tuple_delimiter}get_users function implements the /api/v1/users API endpoint.
    {completion_delimiter}

