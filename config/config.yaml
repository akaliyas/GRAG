  # BM25 关键词检索配置
  bm25:
    enabled: ${BM25_ENABLED:true}  # 是否启用 BM25 索引
    index_dir: ${BM25_INDEX_DIR:./rag_storage/bm25}  # 索引文件存储目录
    # BM25 参数
    k1: ${BM25_K1:1.5}  # 控制词频饱和度 (1.2-2.0)
    b: ${BM25_B:0.75}  # 控制文档长度归一化 (0.5-1.0)
    epsilon: ${BM25_EPSILON:0.25}  # 下界归一化参数
    # RRF (Reciprocal Rank Fusion) 参数
    rrf_k: ${BM25_RRF_K:60}  # RRF 基础常数，用于融合向量检索和 BM25 结果
    rrf_adaptive: ${BM25_RRF_ADAPTIVE:true}  # 是否启用自适应 RRF (默认 true)
    rrf_strategy: ${BM25_RRF_STRATEGY:auto}  # 自适应策略: auto, conservative, aggressive, source_count, score_variance

# 模型配置
models:
  # DeepSeek API 模型 (ds = DeepSeek)
  ds:
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com
    model_name: deepseek-chat
    temperature: 0.3  # ✅ 优化：测试表明 0.3 显著提升指令遵循能力（技术类型准确率 100% vs 60%）
    max_tokens: 2000

  # Qwen API 模型 (Alibaba DashScope)
  qwen:
    api_key: ${QWEN_API_KEY}
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: ${QWEN_MODEL_NAME:qwen-plus}
    temperature: 0.3  # Qwen 建议较低温度以提升指令遵循
    max_tokens: 2000

  # ============================================================================
  # Ollama 本地模型暂时禁用（配置保留）
  # ============================================================================
  local:
    base_url: ${LOCAL_MODEL_URL:http://localhost:11434}  # Ollama 默认地址
    model_name: ${LOCAL_MODEL_NAME:qwen2.5:7b}
    temperature: 0.7
    max_tokens: 2000
    timeout: 60

# 模型切换策略
model_switch:
  priority: ds  # 默认使用 DeepSeek（Qwen API 欠费临时切换）；可选: ds=DeepSeek, qwen（API欠费不可用）
  fallback_to_api: false  # local 失败时回退到 api
  health_check_interval: 300  # 健康检查间隔（秒）

# API 配置
api:
  host: 0.0.0.0
  port: 8000
  debug: true
  title: GRAG 技术文档智能问答系统
  version: 1.0.0
  # 认证配置
  auth:
    enabled: false
    username: ${API_USERNAME:admin}
    password: ${API_PASSWORD}  # 从环境变量读取

# 前端配置
frontend:
  port: 8501
  host: 0.0.0.0


# 缓存配置
cache:
  enabled: true
  # LRU 清理策略
  lru:
    max_size: 10000  # 最大缓存条目数
    cleanup_interval: 3600  # 定时清理间隔（秒）
    cleanup_batch_size: 100  # 每次清理的条目数
  # 质量评分阈值
  quality:
    low_threshold: 0.3  # 低于此分数优先清理
    high_threshold: 0.7  # 高于此分数优先保留

# 日志配置
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/grag.log
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 性能监控
monitoring:
  enabled: true
  metrics_file: logs/metrics.json
  track_api_calls: true
  track_response_time: true

# Context7 配置（补充工具/脚手架）
# 生态位定位：作为 utils 之一，提供辅助功能，不替代 GitHub API
context7:
  enabled: ${CONTEXT7_ENABLED:true}  # 是否启用 Context7 功能
  api_key: ${CONTEXT7_API_KEY}  # Context7 API Key（从环境变量读取）
  base_url: ${CONTEXT7_BASE_URL:https://context7.com/api}  # API 地址
  timeout: ${CONTEXT7_TIMEOUT:30}  # 请求超时时间（秒）
  # 功能开关
  features:
    library_search: true  # 库搜索功能（发现相关技术栈）
    doc_context: true  # 文档上下文获取（补充时效性）
    metadata_enhancement: true  # 元数据增强（为文档添加相关库链接）
  # 限流配置
  rate_limit:
    max_requests_per_minute: 60  # 每分钟最大请求数
    max_concurrent_requests: 5  # 最大并发请求数

