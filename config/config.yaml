# 系统配置文件
# 敏感信息通过环境变量提供

# 数据库配置
database:
  postgresql:
    host: ${POSTGRES_HOST:localhost}
    port: ${POSTGRES_PORT:5432}
    database: ${POSTGRES_DB:grag_db}
    user: ${POSTGRES_USER:grag_user}
    password: ${POSTGRES_PASSWORD}  # 从环境变量读取
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
  
  neo4j:
    uri: ${NEO4J_URI:neo4j://localhost:7687}
    username: ${NEO4J_USERNAME:neo4j}
    password: ${NEO4J_PASSWORD:neo4j_password}
    database: ${NEO4J_DATABASE:neo4j}
    max_connection_pool_size: ${NEO4J_MAX_CONNECTION_POOL_SIZE:100}
    connection_timeout: ${NEO4J_CONNECTION_TIMEOUT:30}

# LightRAG 配置
lightrag:
  llm_model: ${LLM_MODEL:api}  # api 或 local
  embedding_model: ${EMBEDDING_MODEL:BAAI/bge-m3}  # 支持: BAAI/bge-m3, Pro/BAAI/bge-m3, text-embedding-3-small 等
  embedding_provider: ${EMBEDDING_PROVIDER:siliconflow}  # siliconflow, ollama, openai
  embedding_api_key: ${EMBEDDING_API_KEY}  # SiliconFlow 或 OpenAI API key (从环境变量读取)
  embedding_base_url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}  # SiliconFlow API 地址
  # 存储类型：file=文件系统（本地应用化），postgresql=Docker数据库，neo4j=图数据库
  storage_type: ${LIGHTRAG_STORAGE_TYPE:file}  # file, postgresql 或 neo4j
  # 文件存储目录（storage_type=file 时使用）
  working_dir: ${LIGHTRAG_WORKING_DIR:./rag_storage}
  # 存储后端配置
  kv_storage: ${LIGHTRAG_KV_STORAGE:JsonKVStorage}  # JsonKVStorage, PGKVStorage
  vector_storage: ${LIGHTRAG_VECTOR_STORAGE:NanoVectorDBStorage}  # NanoVectorDBStorage, PGVectorStorage
  graph_storage: ${LIGHTRAG_GRAPH_STORAGE:NetworkXStorage}  # NetworkXStorage, PGGraphStorage, Neo4JStorage
  doc_status_storage: ${LIGHTRAG_DOC_STATUS_STORAGE:JsonDocStatusStorage}  # JsonDocStatusStorage, PGDocStatusStorage
  # 实体/关系抽取的 prompt
  entity_extraction_prompt: |
    你是一个技术文档实体抽取专家。请从以下技术文档文本中提取关键实体。

    实体类型定义（12个核心类型）：

    1. Technology（技术）：框架、库、语言、工具、平台等
       示例：React, FastAPI, PostgreSQL, Docker, Python, Git, Kubernetes

    2. Concept（概念）：抽象概念、设计模式、技术原理
       示例：异步编程, 微服务架构, 依赖注入, 中间件, 容器化, RESTful

    3. Component（组件）：系统组成单元、模块、类
       示例：API控制器, 数据模型, 中间件, 服务层, 路由组件

    4. API（接口）：可编程接口、端点、函数
       示例：REST API, /api/v1/users, openai.chat(), GraphQL query

    5. Command（命令）：命令行指令、脚本命令
       示例：npm install, docker-compose up, git push, python main.py

    6. Configuration（配置）：配置项、参数、环境变量
       示例：DATABASE_URL, MAX_CONNECTIONS, timeout, .env 文件中的配置项

    7. Operation（操作）：操作流程、任务、步骤
       示例：数据库迁移, 身份验证流程, 数据预处理, 部署流程

    8. File（文件）：文件路径、配置文件、脚本文件
       示例：config.yaml, main.py, Dockerfile, .gitignore, requirements.txt

    9. Resource（资源）：外部依赖、数据源、基础设施
       示例：PostgreSQL数据库, Redis缓存, S3存储, Kafka消息队列

    10. Service（服务）：运行服务、后台任务、微服务
        示例：API服务, 后台任务处理, 消息队列消费者, 定时任务服务

    11. Environment（环境）：部署环境、运行环境
        示例：生产环境, 开发环境, Docker容器, Kubernetes Pod

    12. Document（文档）：文档和参考资源
        示例：API文档, RFC规范, 官方文档, README, 技术博客

    抽取原则：
    - 优先抽取对用户检索有价值的关键实体
    - 实体名称应简洁明确，避免冗余描述
    - 对于边界情况，选择最符合检索场景的类型
    - Technology 类型涵盖框架、库、工具、语言，不细分

    文本内容：
    {text}
  relation_extraction_prompt: |
    你是一个技术文档关系抽取专家。请从以下文本中提取实体之间的关系。

    关系类型定义：

    1. depends_on（依赖）：一个实体依赖另一个实体才能正常工作
       示例：Application depends_on PostgreSQL, FastAPI depends_on Pydantic

    2. uses（使用）：一个实体使用另一个实体的功能
       示例：Controller uses Service, API uses Database

    3. implements（实现）：一个实体实现另一个实体定义的接口或规范
       示例：UserController implements APIInterface, Repository implements ORM

    4. contains（包含）：一个实体包含另一个实体作为组成部分
       示例：Application contains API层, System contains Database

    5. configures（配置）：一个实体配置另一个实体的行为
       示例：.env configures Application, config.yaml configures Service

    6. deploys_to（部署）：一个实体部署到另一个实体
       示例：Application deploys_to Docker, Service deploys_to Kubernetes

    7. relates_to（相关）：两个实体存在关联但关系不明确
       示例：Microservices relates_to Docker（微服务和Docker相关但不是上述明确关系）

    抽取原则：
    - 优先抽取对理解系统架构和检索有价值的关系
    - 关系描述应简洁明确
    - 避免抽取过于琐碎的关系

    文本内容：
    {text}

  # BM25 关键词检索配置
  bm25:
    enabled: ${BM25_ENABLED:true}  # 是否启用 BM25 索引
    index_dir: ${BM25_INDEX_DIR:./rag_storage/bm25}  # 索引文件存储目录
    # BM25 参数
    k1: ${BM25_K1:1.5}  # 控制词频饱和度 (1.2-2.0)
    b: ${BM25_B:0.75}  # 控制文档长度归一化 (0.5-1.0)
    epsilon: ${BM25_EPSILON:0.25}  # 下界归一化参数
    # RRF (Reciprocal Rank Fusion) 参数
    rrf_k: ${BM25_RRF_K:60}  # RRF 常数，用于融合向量检索和 BM25 结果

# 模型配置
models:
  api:
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com
    model_name: deepseek-chat
    temperature: 0.7
    max_tokens: 2000
  
  # ============================================================================
  # Ollama 本地模型暂时禁用（配置保留）
  # ============================================================================
  local:
    base_url: ${LOCAL_MODEL_URL:http://localhost:11434}  # Ollama 默认地址
    model_name: ${LOCAL_MODEL_NAME:qwen2.5:7b}
    temperature: 0.7
    max_tokens: 2000
    timeout: 60

# 模型切换策略
model_switch:
  priority: api  # api 或 local（local 暂时禁用）
  fallback_to_api: false  # local 失败时回退到 api
  health_check_interval: 300  # 健康检查间隔（秒）

# API 配置
api:
  host: 0.0.0.0
  port: 8000
  debug: true
  title: GRAG 技术文档智能问答系统
  version: 1.0.0
  # 认证配置
  auth:
    enabled: false
    username: ${API_USERNAME:admin}
    password: ${API_PASSWORD}  # 从环境变量读取

# 前端配置
frontend:
  port: 8501
  host: 0.0.0.0


# 缓存配置
cache:
  enabled: true
  # LRU 清理策略
  lru:
    max_size: 10000  # 最大缓存条目数
    cleanup_interval: 3600  # 定时清理间隔（秒）
    cleanup_batch_size: 100  # 每次清理的条目数
  # 质量评分阈值
  quality:
    low_threshold: 0.3  # 低于此分数优先清理
    high_threshold: 0.7  # 高于此分数优先保留

# 日志配置
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/grag.log
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 性能监控
monitoring:
  enabled: true
  metrics_file: logs/metrics.json
  track_api_calls: true
  track_response_time: true

