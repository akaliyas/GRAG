# GRAG Docker 部署预设配置
# 适用于 Docker Compose / Kubernetes 部署
# 使用 PostgreSQL + Neo4j 数据库

# 存储配置
storage:
  # 缓存存储（使用 PostgreSQL）
  cache_storage:
    backend: postgresql
    # 数据库配置从 docker-compose.yml 环境变量注入

  # 图存储（使用 Neo4j）
  graph_storage:
    backend: neo4j
    # Neo4j 配置从 docker-compose.yml 环境变量注入

  # 知识库存储（LightRAG）
  knowledge_storage:
    backend: postgresql
    # 数据库配置从 docker-compose.yml 环境变量注入

# 数据库配置（从环境变量读取）
database:
  postgresql:
    host: ${POSTGRES_HOST:-postgres}
    port: ${POSTGRES_PORT:-5432}
    database: ${POSTGRES_DB:-grag_db}
    user: ${POSTGRES_USER:-grag_user}
    password: ${POSTGRES_PASSWORD}
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30

  neo4j:
    uri: ${NEO4J_URI:-neo4j://localhost:7687}
    username: ${NEO4J_USERNAME:-neo4j}
    password: ${NEO4J_PASSWORD}
    database: ${NEO4J_DATABASE:-neo4j}
    max_connection_pool_size: ${NEO4J_MAX_CONNECTION_POOL_SIZE:-100}
    connection_timeout: ${NEO4J_CONNECTION_TIMEOUT:-30}

# LightRAG 配置
lightrag:
  llm_model: api
  embedding_model: BAAI/bge-m3
  embedding_provider: siliconflow
  embedding_api_key: ${EMBEDDING_API_KEY}
  embedding_base_url: https://api.siliconflow.cn/v1

  # 数据库存储模式
  storage_type: postgresql

  # 数据库存储后端
  kv_storage: PGKVStorage
  vector_storage: PGVectorStorage
  graph_storage: Neo4JStorage
  doc_status_storage: PGDocStatusStorage

# 特性开关
features:
  requires_docker: true
  local_filesystem: false
  graph_visualization: true  # 支持 Neo4j 图导出

# 部署信息
deployment:
  mode: docker
  description: "Docker 部署 - 需要 PostgreSQL + Neo4j"
  requirements:
    - Docker
    - Docker Compose
  services:
    - postgres
    - neo4j
    - api
    - frontend
