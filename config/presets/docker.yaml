# GRAG Docker 部署预设配置
# 适用于 Docker Compose / Kubernetes 部署
# 使用 PostgreSQL + Neo4j 数据库

# 存储配置
storage:
  # 缓存存储（Docker 环境默认使用 JSON，可配置 PostgreSQL）
  cache_storage:
    backend: json  # 设置为 postgresql 启用数据库存储
    cache_dir: ./data/cache

  # 图存储（Docker 环境默认使用 JSON，可配置 Neo4j）
  graph_storage:
    backend: json  # 设置为 neo4j 启用图数据库
    data_dir: ./rag_storage

  # 知识库存储（LightRAG）
  knowledge_storage:
    backend: json
    data_dir: ./rag_storage

# 数据库配置（从环境变量读取）
database:
  postgresql:
    host: ${POSTGRES_HOST:-postgres}
    port: ${POSTGRES_PORT:-5432}
    database: ${POSTGRES_DB:-grag_db}
    user: ${POSTGRES_USER:-grag_user}
    password: ${POSTGRES_PASSWORD}
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30

  neo4j:
    uri: ${NEO4J_URI:-neo4j://localhost:7687}
    username: ${NEO4J_USERNAME:-neo4j}
    password: ${NEO4J_PASSWORD}
    database: ${NEO4J_DATABASE:-neo4j}
    max_connection_pool_size: ${NEO4J_MAX_CONNECTION_POOL_SIZE:-100}
    connection_timeout: ${NEO4J_CONNECTION_TIMEOUT:-30}

# LightRAG 配置
lightrag:
  llm_model: api
  embedding_model: BAAI/bge-m3
  embedding_provider: siliconflow
  embedding_api_key: ${EMBEDDING_API_KEY}
  embedding_base_url: https://api.siliconflow.cn/v1

  # 存储模式（Docker 环境默认使用文件存储）
  storage_type: file  # 设置为 postgresql 启用数据库存储

  # 如启用数据库模式，取消以下注释
  # kv_storage: PGKVStorage
  # vector_storage: PGVectorStorage
  # graph_storage: Neo4JStorage
  # doc_status_storage: PGDocStatusStorage

# 特性开关
features:
  requires_docker: true
  local_filesystem: true  # Docker 内使用文件系统存储
  graph_visualization: true

# 部署信息
deployment:
  mode: docker
  description: "Docker 容器化部署 - 支持多种存储后端"
  requirements:
    - Docker
    - Docker Compose
  services:
    - api  # 必需
    - frontend  # 必需
    - postgres  # 可选（用于 PostgreSQL 存储模式）
    - neo4j  # 可选（用于 Neo4j 存储模式）
